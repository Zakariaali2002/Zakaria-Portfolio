git confi<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Messages Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a12;
      color: #e8e8f0;
      min-height: 100vh;
      padding: 24px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    h1 {
      font-size: 24px; font-weight: 700;
      background: linear-gradient(92deg, #a78bfa, #e879f9);
      -webkit-background-clip: text;
      background-clip: text; color: transparent;
    }
    .stats {
      display: flex; gap: 16px; margin-bottom: 28px;
    }
    .stat-card {
      flex: 1; padding: 18px 22px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(18,18,31,0.6);
    }
    .stat-card p:first-child { font-size: 28px; font-weight: 700; color: #c084fc; }
    .stat-card p:last-child { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 2px; }
    .loading, .empty {
      text-align: center; padding: 60px 20px;
      border-radius: 14px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(18,18,31,0.4); color: rgba(255,255,255,0.4);
    }
    .loading { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .spinner {
      width: 20px; height: 20px; border: 2px solid rgba(139,92,246,0.3);
      border-top-color: #8b5cf6; border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    table {
      width: 100%; border-collapse: collapse;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
      overflow: hidden;
    }
    th {
      text-align: left; padding: 14px 16px; font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.05em;
      background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    td {
      padding: 14px 16px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: top;
    }
    tr:hover td { background: rgba(139,92,246,0.04); }
    .name-col { font-weight: 600; color: #fff; }
    .email-col { color: #a78bfa; }
    .subject-col { color: rgba(255,255,255,0.8); }
    .msg-col { color: rgba(255,255,255,0.55); max-width: 300px; }
    .date-col { color: rgba(255,255,255,0.4); font-size: 13px; white-space: nowrap; }
    .del-btn {
      background: rgba(239,68,68,0.15); border: none; color: #ef4444;
      padding: 6px 14px; border-radius: 8px; cursor: pointer;
      font-size: 13px; transition: 0.2s;
    }
    .del-btn:hover { background: rgba(239,68,68,0.3); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 99px;
      font-size: 12px; background: rgba(139,92,246,0.15); color: #a78bfa;
    }
    footer { margin-top: 32px; text-align: center; font-size: 13px; color: rgba(255,255,255,0.3); }
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 14px 24px; border-radius: 12px;
      background: #22c55e; color: #000; font-weight: 600;
      transform: translateY(100px); opacity: 0;
      transition: 0.3s ease; box-shadow: 0 8px 24px rgba(34,197,94,0.3);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      td { padding: 12px 16px; border-bottom: none; }
      td::before {
        content: attr(data-label);
        display: block; font-size: 11px; font-weight: 600;
        color: rgba(255,255,255,0.35); text-transform: uppercase;
        margin-bottom: 4px;
      }
      tr { margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; }
      .stats { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 Messages Dashboard</h1>
      <span class="badge" id="refreshBadge">Live</span>
    </header>

    <div class="stats">
      <div class="stat-card">
        <p id="totalCount">0</p>
        <p>Total Messages</p>
      </div>
      <div class="stat-card">
        <p id="todayCount">0</p>
        <p>Today</p>
      </div>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        Loading messages...
      </div>
    </div>

    <footer>Messages are stored locally on the server.</footer>
  </div>

  <div class="toast" id="toast">Message deleted</div>

  <script>
    async function fetchMessages() {
      const content = document.getElementById('content');
      try {
        const res = await fetch('http://localhost:3001/api/messages');
        if (!res.ok) throw new Error('Failed to fetch');
        const messages = await res.json();
        renderMessages(messages);
      } catch {
        content.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Could not connect to the server.</p><p style="margin-top:8px;font-size:13px">Make sure the backend is running on <strong>localhost:3001</strong></p></div>';
      }
    }

    function renderMessages(messages) {
      const content = document.getElementById('content');
      document.getElementById('totalCount').textContent = messages.length;

      const today = new Date().toDateString();
      const todayMsgs = messages.filter(m => new Date(m.createdAt).toDateString() === today);
      document.getElementById('todayCount').textContent = todayMsgs.length;

      if (messages.length === 0) {
        content.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>No messages yet.</p></div>';
        return;
      }

      const sorted = [...messages].reverse();
      let html = `<table>
        <thead><tr>
          <th>Name</th><th>Email</th><th>Subject</th><th>Message</th><th>Date</th><th>Action</th>
        </tr></thead><tbody>`;

      sorted.forEach(m => {
        const date = new Date(m.createdAt);
        const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        html += `<tr>
          <td class="name-col" data-label="Name">${escapeHtml(m.name)}</td>
          <td class="email-col" data-label="Email">${escapeHtml(m.email)}</td>
          <td class="subject-col" data-label="Subject">${escapeHtml(m.subject)}</td>
          <td class="msg-col" data-label="Message">${escapeHtml(m.message)}</td>
          <td class="date-col" data-label="Date">${dateStr}</td>
          <td data-label="Action"><button class="del-btn" onclick="deleteMessage(${m.id})">Delete</button></td>
        </tr>`;
      });

      html += '</tbody></table>';
      content.innerHTML = html;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function deleteMessage(id) {
      if (!confirm('Delete this message?')) return;
      try {
        await fetch(`http://localhost:3001/api/messages/${id}`, { method: 'DELETE' });
        showToast('Message deleted');
        fetchMessages();
      } catch {
        alert('Failed to delete');
      }
    }

    function showToast(text) {
      const el = document.getElementById('toast');
      el.textContent = text;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }

    fetchMessages();
    setInterval(fetchMessages, 5000);
  </script>
</body>
</html>
